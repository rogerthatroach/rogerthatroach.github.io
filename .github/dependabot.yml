version: 2
updates:
  # Keep the SHA-pinned GitHub Actions in deploy.yml current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore

  # npm dependency updates, grouped to keep noise down.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      types:
        patterns:
          - '@types/*'
