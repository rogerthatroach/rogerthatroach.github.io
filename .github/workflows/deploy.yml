name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild at 12:00 UTC so future-dated blog posts auto-publish
  # on their frontmatter date without a manual redeploy. See
  # isPostPublic() in data/posts/index.ts.
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Third-party actions are pinned to full commit SHAs (supply-chain
# hardening — floating @v4 tags are re-pointable). Dependabot
# (.github/dependabot.yml) keeps these SHAs current. Version in the
# trailing comment.
jobs:
  # Quality gate — blocks the build/deploy if types don't check or a
  # critical advisory lands. The local .githooks/ are bypassable
  # (SKIP_CHECKS=1) and absent in the daily cron; this enforces in CI.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # Gate on critical only (a known next@14 "high" is unexploitable on a
      # static export with no server; it clears with the Next 16 upgrade).
      - run: npm audit --audit-level=critical

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
